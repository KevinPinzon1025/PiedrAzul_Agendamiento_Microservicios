spring:
  application:
    name: AppointmetService

  datasource:
    url: jdbc:h2:mem:appointmentdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

notification:
  service:
    url: http://localhost:8082