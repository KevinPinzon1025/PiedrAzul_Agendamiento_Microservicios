spring:
  application:
    name: AppointmetService
  datasource:
    url: jdbc:postgresql://localhost:5432/AppointmentMS_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect