spring:
  application:
    name: AppointmetService

  datasource:
    url: jdbc:postgresql://localhost:5432/AppointmentMS_db
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ====== NUEVO: configuración RabbitMQ ======
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Nombres centralizados (mismo patrón que BookingGym-Async: constantes en RabbitMQConfig)
piedrAzul:
  rabbitmq:
    exchange: piedrAzul.appointments.exchange
    queue: appointment.created.queue
    routing-key: appointment.created
