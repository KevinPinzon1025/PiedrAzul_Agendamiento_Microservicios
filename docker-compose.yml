services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: piedrazul-keycloak
    command: start-dev --import-realm --hostname-strict=false
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - piedrazul-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: piedrazul-rabbitmq
    ports:
      - "5673:5672"
      - "15672:15672"
    networks:
      - piedrazul-net

  auth-db:
    image: postgres:16-alpine
    container_name: piedrazul-auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - piedrazul-net

  appointment-db:
    image: postgres:16-alpine
    container_name: piedrazul-appointment-db
    environment:
      POSTGRES_DB: AppointmentMS_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5434:5432"
    volumes:
      - appointment-db-data:/var/lib/postgresql/data
    networks:
      - piedrazul-net

  patient-db:
    image: postgres:16-alpine
    container_name: piedrazul-patient-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
    ports:
      - "5433:5432"
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    networks:
      - piedrazul-net

  report-db:
    image: postgres:16-alpine
    container_name: piedrazul-report-db
    environment:
      POSTGRES_DB: reportdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5435:5432"
    volumes:
      - report-db-data:/var/lib/postgresql/data
    networks:
      - piedrazul-net

  professional-db:
    image: postgres:16-alpine
    container_name: piedrazul-professional-db
    environment:
      POSTGRES_DB: professional_db
      POSTGRES_USER: professional_user
      POSTGRES_PASSWORD: professional_pass
    ports:
      - "5436:5432"
    volumes:
      - professional-db-data:/var/lib/postgresql/data
    networks:
      - piedrazul-net

  auth-service:
    build:
      context: ./AuthService
    container_name: piedrazul-auth-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: sistema
      KEYCLOAK_CLIENT_ID: sistema-desktop
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/sistema/protocol/openid-connect/certs
    ports:
      - "8082:8082"
    depends_on:
      - auth-db
      - rabbitmq
      - keycloak
    networks:
      - piedrazul-net

  appointment-service:
    build:
      context: ./AppointmentService
    container_name: piedrazul-appointment-service
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://appointment-db:5432/AppointmentMS_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8083:8083"
    depends_on:
      - appointment-db
      - rabbitmq
    networks:
      - piedrazul-net

  patient-service:
    build:
      context: ./patientService
    container_name: piedrazul-patient-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patient_db
      SPRING_DATASOURCE_USERNAME: patient_user
      SPRING_DATASOURCE_PASSWORD: patient_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8084:8084"
    depends_on:
      - patient-db
      - rabbitmq
    networks:
      - piedrazul-net

  report-service:
    build:
      context: ./report-service
    container_name: piedrazul-report-service
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://report-db:5432/reportdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      PIEDRAZUL_REPORTS_OUTPUT_DIR: /app/generated-reports/appointments
    ports:
      - "8086:8086"
    volumes:
      - report-files:/app/generated-reports
    depends_on:
      - report-db
      - rabbitmq
    networks:
      - piedrazul-net

  professional-service:
    build:
      context: ./professionalService
    container_name: piedrazul-professional-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://professional-db:5432/professional_db
      SPRING_DATASOURCE_USERNAME: professional_user
      SPRING_DATASOURCE_PASSWORD: professional_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8085:8085"
    depends_on:
      - professional-db
      - rabbitmq
    networks:
      - piedrazul-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: piedrazul-api-gateway
    environment:
      SERVER_PORT: 8081
      AUTH_SERVICE_URL: http://auth-service:8082
      APPOINTMENT_SERVICE_URL: http://appointment-service:8083
      PATIENT_SERVICE_URL: http://patient-service:8084
      PROFESSIONAL_SERVICE_URL: http://professional-service:8085
      REPORT_SERVICE_URL: http://report-service:8086
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/sistema/protocol/openid-connect/certs
    ports:
      - "8081:8081"
    depends_on:
      - keycloak
      - auth-service
      - appointment-service
      - patient-service
      - professional-service
      - report-service
    networks:
      - piedrazul-net

volumes:
  auth-db-data:
  appointment-db-data:
  patient-db-data:
  report-db-data:
  professional-db-data:
  report-files:

networks:
  piedrazul-net:
    driver: bridge
