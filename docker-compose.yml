version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: piedrAzul-rabbitmq
    ports:
      - "5672:5672"    # Puerto AMQP (usado por Spring)
      - "15672:15672"  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  report-db:
    image: postgres:16
    container_name: report-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: reportdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - report_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reportdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  report_db_data:
