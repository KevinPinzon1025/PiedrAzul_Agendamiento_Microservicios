server:
  port: 8084

spring:
  application:
    name: report-service
  datasource:
    url: jdbc:postgresql://localhost:5435/reportdb
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

piedrAzul:
  reports:
    output-dir: generated-reports/appointments
  rabbitmq:
    appointments:
      exchange: piedrAzul.appointments.exchange
      created-routing-key: appointment.created
      report-created-queue: report.appointment.created.queue
